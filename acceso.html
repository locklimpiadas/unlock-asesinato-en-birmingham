<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>LOCKLIMPIADAS IV</title>
	<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
	<style>
		* {
		  box-sizing: border-box;
		  margin: 0;
		  padding: 0;
		}
		
		:root {
		  --color-intenso: #DC3545;
		  --color-suave: #FFE28C;
		}		

		body {
		  font-family: 'Roboto', sans-serif;
		  background: linear-gradient(to right, #DC3545, #FFC907);
		  min-height: 100vh;
		  display: flex;
		  justify-content: center;
		  align-items: center;
		  padding: 1rem;
		}

		.marco {
		  background: #fff;
		  width: 90%;
		  max-width: 400px;
		  padding: 2rem;
		  border-radius: 1rem;
		  box-shadow: 0 1rem 2rem rgba(0,0,0,0.2);
		  text-align: center;
		}

		.marco h1 {
		  color: #DC3545;
		  font-size: 2rem;
		  margin-bottom: 1.5rem;
		}

		.marco input {
		  width: 100%;
		  padding: 0.8rem 1rem;
		  margin-bottom: 1rem;
		  font-size: 1rem;
		  border: 1px solid #ccc;
		  border-radius: 0.5rem;
		  transition: border-color 0.3s;
		}

		.marco input:focus {
		  border-color: #DC3545;
		  outline: none;
		}

		.bi { /*Bloque intenso*/
		  background: var(--color-intenso);
		  color: white;
		  padding: 1rem;
		  border-radius: 0.8rem;
		  margin-bottom: 1.5rem;
		  font-size: 1.5rem;
		}

		.bs {/*Bloque suave*/
		  padding: 1rem;
		  border-radius: 0.8rem;
		  margin-bottom: 1rem;
		  text-align: center;
		  background: var(--color-suave);
		  border-left: 5px solid var(--color-intenso);
		  border-right: 5px solid var(--color-intenso);
		  font-size: 1.2rem;
		  font-weight: 700;
		  line-height: 1.5;
		}
		
		.bg { /*Bloque gris*/
		  background: #f5f5f5;
		  border-radius: 0.6rem;
		  padding: 0.6rem;
		  margin-bottom: 1.5rem;
		  font-size: 0.9rem;
		}	

		.tm{ /*Texto intenso*/
		  margin-bottom: 1rem;
		  font-weight: 700;
		  color: var(--color-intenso);
		}

		
		.t { /* Texto normal */
		}
		
		.marco button {
		  width: 100%;
		  padding: 0.8rem 0;
		  font-size: 1rem;
		  font-weight: 700;
		  border: none;
		  border-radius: 0.5rem;
		  background: #DC3545;
		  color: #fff;
		  cursor: pointer;
		  transition: background 0.3s;
		}

		.marco button:hover {
		  background: #DC3545;
		}

		/* Media queries para móviles muy pequeños */
		@media (max-width: 350px) {
		  .marco {
			padding: 1rem;
		  }
		  .marco h1 {
			font-size: 1.5rem;
		  }
		  .marco input, .marco button {
			font-size: 0.9rem;
			padding: 0.6rem;
		  }
		}

		/*Mensajes de aviso*/
		.modal {
		  position: fixed;
		  inset: 0;
		  background: rgba(0,0,0,0.6);
		  display: flex;
		  justify-content: center;
		  align-items: center;
		  z-index: 9999;
		}

		.modal.hidden {
		  display: none;
		}

		.modal-box {
		  background: white;
		  padding: 1.5rem;
		  border-radius: 1rem;
		  width: 90%;
		  max-width: 400px;
		  text-align: center;
		  box-shadow: 0 1rem 2rem rgba(0,0,0,0.3);
		}

		.modal-box h2 {
		  color: #DC3545;
		  margin-bottom: 1rem;
		}

		.modal-box button {
		  margin-top: 1rem;
		  padding: 0.6rem 1.2rem;
		  background: #DC3545;
		  color: white;
		  border: none;
		  border-radius: 0.5rem;
		  font-weight: 700;
		}
	</style>

</head>

<body>

	<!-- DISEÑO FORM BASE -->
	<div class="marco">
		<h1>LOCKLIMPIADAS (IV)</h1> 
		<div class="bs">UNLOCK:<br>Asesinato en Birmingham</div>
		<input type="text" id="carta" name="carta" placeholder="Carta" required>
		<button onclick="buscar()">Buscar</button>
	</div>

	<!-- DISEÑO MODAL -->
	<div id="modal" class="modal hidden">
	  <div class="modal-box">
		<h2 id="modal-title">Aviso</h2>
		<p id="modal-text"></p>
		<button onclick="cerrarModal()">Aceptar</button>
	  </div>
	</div>


	<script> 
		async function buscar() {
		
			const carta = document.getElementById('carta').value + ".png";
			
			window.open(carta, "_blank");
			
			////COMPROBAMOS SI LA CARTA EXISTE
			//fetch(carta, { method: "HEAD" })
			//.then(response => {
			//	if (response.ok) {
			//		window.open(carta, "_blank");
			//	} else {
			//		mostrarModal("Esa carta no existe.");
			//	}
			//})
			//.catch(error => {
			//	console.error(error);
			//	mostrarModal("No se ha podido comprobar si existe esa carta.");
			//});
		}
		
		
		//MODAL
		function mostrarModal(texto, titulo = 'Aviso') {
			document.getElementById('modal-title').textContent = titulo;
			document.getElementById('modal-text').textContent = texto;
			document.getElementById('modal').classList.remove('hidden');
		}

		function cerrarModal() {
		  document.getElementById('modal').classList.add('hidden');
		}
	
		//ERROR LOGIN
		const params = new URLSearchParams(window.location.search);

		if (params.get("error")) {
		  mostrarModal("Credenciales incorrectas");
		}
	</script>

</body>
</html>
